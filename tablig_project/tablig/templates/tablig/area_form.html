{% extends 'tablig/base.html' %}

{% block title %}নতুন এলাকা - TabligApp{% endblock %}
{% block header_title %}নতুন এলাকা যোগ করুন{% endblock %}

{% block extra_css %}
<style>
    .form-container { max-width: 600px; margin: 0 auto; }
    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
    .form-control { width: 100%; padding: 12px 16px; border-radius: var(--radius); border: 1px solid #e2e8f0; }
    .form-control:focus { outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 4px var(--primary-light); }
</style>
{% endblock %}

{% block content %}
<div class="form-container">
    <div class="card">
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>এলাকার নাম</label>
                <input type="text" name="name" class="form-control" placeholder="যেমন: ধানমন্ডি" required>
            </div>
            <div class="form-group">
                <label>বিবরণ (ঐচ্ছিক)</label>
                <textarea name="description" class="form-control" rows="3"></textarea>
            </div>
            <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                <button type="submit" class="btn btn-primary" style="flex: 1; justify-content: center;">সংরক্ষণ করুন</button>
                <a href="{% url 'area_list' %}" class="btn" style="background: #f1f5f9; flex: 1; justify-content: center;">বাতিল</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

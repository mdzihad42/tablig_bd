{% extends 'tablig/base.html' %}

{% block title %}নতুন লেনদেন - TabligApp{% endblock %}
{% block header_title %}আয়/ব্যয়ের বিবরণ{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto;">
    <div class="card">
        <form method="post">
            {% csrf_token %}
            <div style="margin-bottom: 1.25rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">লেনদেনের ধরণ</label>
                <select name="type" class="form-control" required>
                    {% for value, label in form.type.field.choices %}
                        <option value="{{ value }}">{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
            <div style="margin-bottom: 1.25rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">পরিমান (৳)</label>
                <input type="number" step="0.01" name="amount" class="form-control" required>
            </div>
            <div style="margin-bottom: 1.25rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">বিভাগ</label>
                <input type="text" name="category" class="form-control" placeholder="যেমন: মসজিদ ফান্ড, খানা খরচ" required>
            </div>
            <div style="margin-bottom: 1.25rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">তারিখ</label>
                <input type="date" name="date" class="form-control" required>
            </div>
            <div style="margin-bottom: 1.25rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">সদস্য (যদি কেউ দান করেন)</label>
                <select name="member" class="form-control">
                    <option value="">নির্বাচন করুন</option>
                    {% for member in form.member.field.queryset %}
                        <option value="{{ member.id }}">{{ member.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div style="margin-bottom: 1.25rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">বিবরণ</label>
                <textarea name="description" class="form-control" rows="3"></textarea>
            </div>

            <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                <button type="submit" class="btn btn-primary" style="flex: 1; justify-content: center;">সেভ করুন</button>
                <a href="{% url 'finance_list' %}" class="btn" style="background: #f1f5f9; flex: 1; justify-content: center;">বাতিল</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
